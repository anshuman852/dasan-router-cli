# =============================================================================
# GoReleaser configuration — cross-platform binaries attached to GitHub releases
# =============================================================================
version: 2

project_name: dasan

builds:
  - id: dasan
    dir: cmd/dasan
    binary: dasan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    builds:
      - dasan
    name_template: >-
      dasan_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - dasan-dashboard.json
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: anshuman852
    name: dasan-router-cli
  prerelease: auto
  mode: append
