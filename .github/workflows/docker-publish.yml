# =============================================================================
# Build multi-arch Docker image and push to GHCR
# =============================================================================
# Uses a build matrix (native arch, no QEMU emulation) for faster builds.
# Each arch builds independently, pushes by digest, then digests are merged
# into a single multi-arch manifest list.
# =============================================================================
name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dasan

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set safe platform name
        id: platform
        run: |
          PLATFORM="${{ matrix.platform }}"
          echo "safe=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          echo "${{ steps.build.outputs.digest }}" > "${{ runner.temp }}/digests/${{ steps.platform.outputs.safe }}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.platform.outputs.safe }}
          path: ${{ runner.temp }}/digests/
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download all digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          SOURCES=""
          for f in "${{ runner.temp }}"/digests/*; do
            [ -f "$f" ] && SOURCES="$SOURCES ${IMAGE}@$(cat "$f")"
          done

          TAGS=""
          IFS=',' read -ra TAG_LIST <<< "${{ steps.meta.outputs.tags }}"
          for t in "${TAG_LIST[@]}"; do
            TAGS="$TAGS -t $t"
          done

          echo "Merging architectures into: ${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create $TAGS $SOURCES
